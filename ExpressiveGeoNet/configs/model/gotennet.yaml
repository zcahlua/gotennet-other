_target_: src.model.system.GotenModel
label: ${label}
task: ${task}

cutoff: 5.0
lr: 0.0001
lr_decay: 0.8
lr_patience: 15
lr_monitor: "validation/val_loss"
ema_decay: 0.9
weight_decay: 0.01

output:
  n_hidden: 256

representation:
  __target__: src.model.representation.GotenNetWrapper
  n_atom_basis: 256
  n_interactions: 6
  n_rbf: 64
  cutoff_fn:
    __target__: src.model.layers.CosineCutoff
    cutoff: 5.0
  radial_basis: "expnorm"
  activation: "swish"
  max_z: 100
  weight_init: "xavier_uniform"
  bias_init: "zeros"
  layernorm: ""
  steerable_norm: ""
  residual_scale: 1.0
  edge_residual_scale: 1.0
  num_heads: 8
  attn_dropout: 0.1
  edge_updates: True
  lmax: 2
  aggr: "add"
  scale_edge: False
  evec_dim:
  emlp_dim:
  sep_htr: True
  sep_dir: True
  sep_tensor: True
  edge_ln: ""
