# @package _global_
# MD22 Wide Original Paper Reproduction Config (GotenNetL)
# Paper: n_interactions=8, n_atom_basis=384, cutoff=4.0, edge_refinement_dim=768

defaults:
  - md22_original.yaml

model:
  representation:
    n_interactions: 8
    n_atom_basis: 384
    evec_dim: 768
    emlp_dim: 768
    cutoff_fn:
      __target__: src.model.layers.CosineCutoff
      cutoff: 4.0
  output:
    n_hidden: 384

datamodule:
  hparams:
    batch_size: 4
    inference_batch_size: 4

project: "ExpGeoNet_md22_wide_original"
