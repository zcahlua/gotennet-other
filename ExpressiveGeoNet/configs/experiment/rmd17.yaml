# @package _global_

defaults:
- override /dataset@datamodule: rmd17.yaml
- override /model: gotennet.yaml
- override /callbacks: default.yaml
- override /logger: wandb.yaml
- override /trainer: default.yaml

datamodule:
  hparams:
    seed: 1
    standardize: true
    splits: 0
    batch_size: 24
    inference_batch_size: 24

model:
  lr: 0.0002
  lr_warmup_steps: 1500
  lr_monitor: "validation/MeanAbsoluteError_force"
  lr_decay: 0.7
  lr_patience: 20
  lr_minlr: 1e-7
  weight_decay: 0.001
  task_config:
    task_loss: "MSELoss"
    loss_weights:
    - 0.05
    - 0.95

  representation:
    n_interactions: 10
    n_atom_basis: 192
    radial_basis: "expnorm"
    n_rbf: 32
    edge_updates: "linw"
    lmax: 2
    evec_dim: 512
  output:
    n_hidden: 192

trainer:
  max_epochs: 3000
  inference_mode: False
  gradient_clip_val: 5.0
  gradient_clip_algorithm: norm

callbacks:
  early_stopping:
    monitor: "validation/MeanAbsoluteError_force"
    patience: 500
    min_delta: 1e-5
  model_checkpoint:
    monitor: "validation/MeanAbsoluteError_force"

project: "ExpGeoNet_rmd17"

task: "rMD17"
