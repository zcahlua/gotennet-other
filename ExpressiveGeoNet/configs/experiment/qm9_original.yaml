# @package _global_
# QM9 Original Paper Reproduction Config (GotenNetB)
# Based on Table 6 of "GotenNet: Rethinking Efficient 3D Equivariant Graph Neural Networks"
#
# Key corrections vs ExpressiveGeoNet qm9.yaml:
#   - weight_decay: 0.01 (was 0.001)
#   - gradient_clip_val: 10.0 (was 2.0)
#   - attn_dropout: 0.1 (was 0.05)
#   - lr_monitor: val_loss (was MAE)
#   - evec_dim/emlp_dim explicitly set
#   - edge_updates: True (was missing, relying on model default)
#   - standardize: false (correct for QM9)

defaults:
  - override /dataset@datamodule: qm9.yaml
  - override /model: gotennet.yaml
  - override /callbacks: default.yaml
  - override /logger: csv.yaml
  - override /trainer: default.yaml

datamodule:
  hparams:
    batch_size: 32
    inference_batch_size: 128
    seed: 1
    standardize: false
    persistent_workers: true
    prefetch_factor: 4

model:
  lr: 0.0001
  lr_warmup_steps: 10000
  lr_monitor: "validation/val_loss"
  lr_decay: 0.8
  lr_minlr: 1e-7
  lr_patience: 15
  weight_decay: 0.01
  use_ema: false
  task_config:
    task_loss: "MSELoss"
  representation:
    n_interactions: 6
    n_atom_basis: 256
    radial_basis: "expnorm"
    n_rbf: 64
    attn_dropout: 0.1
    edge_updates: True
    lmax: 2
    scale_edge: false
    sep_dir: true
    sep_tensor: true
    sep_htr: true
    evec_dim: 256
    emlp_dim: 256
    weight_init: "xavier_uniform"
    bias_init: "zeros"
    aggr: "add"
    num_heads: 8
  output:
    n_hidden: 256

trainer:
  max_epochs: 1000
  gradient_clip_val: 10.0
  gradient_clip_algorithm: norm

callbacks:
  early_stopping:
    monitor: "validation/val_loss"
    patience: 1000
  model_checkpoint:
    monitor: "validation/val_loss"

project: "ExpGeoNet_qm9_original"
