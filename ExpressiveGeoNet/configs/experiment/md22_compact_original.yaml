# @package _global_
# MD22 Compact Original Paper Reproduction Config (GotenNetS)
# Paper: n_interactions=4, n_atom_basis=128, edge_refinement_dim=384

defaults:
  - md22_original.yaml

model:
  representation:
    n_interactions: 4
    n_atom_basis: 128
    evec_dim: 384
    emlp_dim: 384
  output:
    n_hidden: 128

datamodule:
  hparams:
    batch_size: 4
    inference_batch_size: 4

project: "ExpGeoNet_md22_compact_original"
