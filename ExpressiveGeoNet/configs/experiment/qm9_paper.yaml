# @package _global_

defaults:
- qm9.yaml

# Paper-aligned QM9 base reproduction config.
# Table 6 reports a learning-rate range [6e-5, 1e-4] across targets; the
# runnable paper manifest uses the upper end by default unless overridden per
# property at launch time.

datamodule:
  hparams:
    batch_size: 32
    inference_batch_size: 128
    seed: 1
    standardize: false

model:
  lr: 0.0001
  lr_warmup_steps: 10000
  lr_monitor: "validation/val_loss"
  lr_decay: 0.8
  lr_minlr: 1e-7
  lr_patience: 15
  weight_decay: 0.01
  task_config:
    task_loss: "MSELoss"
  representation:
    n_interactions: 6
    n_atom_basis: 256
    radial_basis: "expnorm"
    n_rbf: 64
    attn_dropout: 0.1
    edge_updates: True
    lmax: 2
    evec_dim: 256
    emlp_dim: 256
  output:
    n_hidden: 256

trainer:
  max_epochs: 1000
  gradient_clip_val: 10.0
  gradient_clip_algorithm: norm

callbacks:
  early_stopping:
    monitor: "validation/val_loss"
    patience: 1000
  model_checkpoint:
    monitor: "validation/val_loss"

project: "ExpGeoNet_qm9_paper"
