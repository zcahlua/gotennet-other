# @package _global_

defaults:
- molecule3d.yaml

datamodule:
  hparams:
    batch_size: 256
    inference_batch_size: 256
    train_size: null
    val_size: null
    test_size: null
    split_config: Molecule3D_random_split

model:
  lr: 0.0001
  lr_warmup_steps: 5000
  lr_monitor: "validation/val_loss"
  lr_decay: 0.8
  lr_patience: 5
  lr_minlr: 1e-7
  weight_decay: 0.01
  task_config:
    task_loss: "L1Loss"
  representation:
    n_interactions: 12
    n_atom_basis: 384
    n_rbf: 32
    edge_updates: true
    evec_dim: 384
  output:
    n_hidden: 384

trainer:
  max_epochs: 300
  # Table 6 reports no gradient clipping for Molecule3D.
  gradient_clip_val: 0.0

callbacks:
  early_stopping:
    monitor: "validation/val_loss"
    patience: 300
    min_delta: 1e-5
  model_checkpoint:
    monitor: "validation/val_loss"

project: "ExpGeoNet_molecule3d_tuned"
