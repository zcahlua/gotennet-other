# @package _global_

defaults:
  - override /dataset@datamodule: md22.yaml
  - override /model: gotennet.yaml
  - override /callbacks: default.yaml
  - override /logger: wandb.yaml # set logger here or use command line (e.g. `python train.py logger=tensorboard`)
  - override /trainer: default.yaml

datamodule:
  hparams:
    seed: 1
    standardize: true
    batch_size: 4
    inference_batch_size: 4

label: "at_at"
model:
  # Table 6 reports a per-system learning-rate range of [4e-5, 1e-4].
  # This base config uses the upper bound; override `model.lr` for system-specific sweeps.
  lr: 0.0001
  lr_warmup_steps: 1000
  lr_monitor: "validation/val_loss"
  lr_minlr: 1.e-07
  lr_patience: 30
  weight_decay: 0.01
  task_config:
    task_loss: "MSELoss"
    loss_weights:
        - 0.05
        - 0.95

  representation:
    n_interactions: 6
    n_atom_basis: 256
    radial_basis: "expnorm"
    n_rbf: 32
    edge_updates: "linw"
    lmax: 2
    evec_dim: 768

  output:
    n_hidden: 256

trainer:
  max_epochs: 3000
  inference_mode: False
  gradient_clip_val: 5.0

callbacks:
  early_stopping:
    monitor: "validation/val_loss"
    patience: 3000 
  model_checkpoint:
    monitor: "validation/val_loss"
project: "ExpGeoNet_md22"

task: "MD22"
